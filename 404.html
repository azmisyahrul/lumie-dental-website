<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan — Lumie Dental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f8f9 0%, #ffffff 50%, #e8f0f3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        .emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #48778a, #8ac6cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        p {
            color: #64748b;
            font-size: 18px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #48778a, #8ac6cc);
            color: white;
            border-radius: 9999px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(72, 119, 138, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(72, 119, 138, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🦷</div>
        <h1>404</h1>
        <p>Halaman yang kamu cari tidak ditemukan. Mungkin sudah dipindahkan atau salah alamat.</p>
        <a href="/" class="btn">
            ← Kembali ke Beranda
        </a>
    </div>
</body>
</html>
